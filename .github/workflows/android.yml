name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Sync Capacitor Web Assets to Android
        run: npx cap sync

      - name: Prepare persistent Debug Keystore
        run: |
          if [ -f android/app/debug.keystore ]; then
            echo "Persistent debug.keystore found."
          else
            echo "Persistent debug.keystore NOT found. Generating a new one..."
            keytool -genkeypair -v \
              -keystore android/app/debug.keystore \
              -alias androiddebugkey \
              -storepass android \
              -keypass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          
          echo "==== DEBUG KEYSTORE SHA-1 FINGERPRINT ===="
          keytool -list -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -storepass android | grep SHA1
          echo "=========================================="

      - name: Build APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-in-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Persistent Debug Keystore
        uses: actions/upload-artifact@v4
        with:
          name: persistent-debug-keystore
          path: android/app/debug.keystore
          retention-days: 7

